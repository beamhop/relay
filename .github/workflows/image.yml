# Build and push the relay image to GHCR on every main push, then promote: the promote job pins
# the new short-SHA tag in gitops/apps/deployment.yaml and pushes the bump back to main (Argo CD
# picks it up). Gitops-only commits skip the rebuild via paths-ignore, and GITHUB_TOKEN pushes
# never retrigger workflows, so the bump can't loop.
name: Image (GHCR)

on:
  push:
    branches: [main]
    paths-ignore:
      - "gitops/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/relay
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      # amd64 only — matches the Hetzner amd64 node. Emulated arm64 buys nothing while the node is x86.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # branch tip, not the trigger SHA — we push a commit back

      - name: Pin image SHA in gitops/apps/deployment.yaml
        run: |
          short=${GITHUB_SHA::7}
          sed -i "s|image: ghcr.io/beamhop/relay:.*|image: ghcr.io/beamhop/relay:${short}|" gitops/apps/deployment.yaml
          if git diff --quiet; then
            echo "Already pinned to ${short} — nothing to promote."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "gitops: roll out ${short}"
          # Retry once in case main moved while we were building.
          git push || (git pull --rebase origin main && git push)
