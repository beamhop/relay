apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: relay

# The `relay` namespace, the CNPG Database CR, and the secrets stay platform-managed
# (platform-gitops platform/relay, slim-split). This tenant owns only the app workload.
resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - certificate.yaml
  - ingress.yaml
