# Local run paths (ADR-0005).
#
#   Standalone, in-memory, dependency-free (default):
#     docker compose up relay
#
#   Production SQL-native path against a local Postgres:
#     docker compose --profile postgres up db relay-db
#
# The standalone `relay` service has no profile and no dependencies; the Postgres path lives
# behind the `postgres` profile so the default invocation stays dependency-free.
#
# Both relays enable the password-protected admin panel (--web + RELAY_PASSWORD). The password
# defaults to "change-me"; override it with RELAY_ADMIN_PASSWORD (e.g. in a .env file).
#   standalone admin: http://localhost:7777/admin
#   postgres   admin: http://localhost:7778/admin

services:
  relay:
    build: .
    image: beamhop-relay
    command: ["bun", "run", "src/main.ts", "--web"]
    environment:
      RELAY_PASSWORD: ${RELAY_ADMIN_PASSWORD:-change-me}
    ports:
      - "7777:7777"
    # No storage config -> memory backend (the one invariant: zero-dependency standalone).

  db:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    volumes:
      - relay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d relay"]
      interval: 2s
      timeout: 3s
      retries: 15

  relay-db:
    profiles: ["postgres"]
    build: .
    image: beamhop-relay
    command: ["bun", "run", "src/main.ts", "--web"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      RELAY_STORAGE_BACKEND: postgres
      DATABASE_URL: postgres://postgres:relay@db:5432/relay
      # Dedicated schema isolates our tables from anything else in the database (mirrors prod,
      # where the `relay` database still holds the previous relay's public.* tables).
      RELAY_POSTGRES_SCHEMA: beamhop
      RELAY_PASSWORD: ${RELAY_ADMIN_PASSWORD:-change-me}
    ports:
      - "7778:7777"

volumes:
  relay-pgdata:
